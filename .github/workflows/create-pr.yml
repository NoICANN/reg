name: Generate & Publish Domain PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  generate-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - run: npm install

      - run: node .github/scripts/generate-pr.js

      - uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔖 Register new domains (auto-generated)"
          branch: domain-reg-${{ github.run_id }}
          title: "Register new domain(s)"
          body: |
            This PR was automatically generated by GitHub Actions to register
            new domain requests from Supabase.
          base: main
          files: |
            data/**

