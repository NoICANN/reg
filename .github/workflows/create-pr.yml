name: Generate & Publish Domain PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write
 
env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  generate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # fetch full history so we can create branches

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate domain files
        run: node .github/scripts/generate-pr.js

      - name: Configure Git identity
        run: |
          git config user.name "noicann-bot"
          git config user.email "bot@noicann.org"

      - name: Check for changes
        id: git-check
        run: |
          # If no diff, exit with changed=false
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push new domain files
        if: steps.git-check.outputs.changed == 'false'
        run: |
          BRANCH=domain-reg-${{ github.run_id }}
          git checkout -b $BRANCH
          # Stage only the data/ directory
          git add data/
          git commit -m "🔖 Register new domains (auto-generated)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/NoICANN/reg.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        run: |
            gh pr create --title "Add new domain files" --body "Auto-generated domain files" --base main --head domain-reg-14805012932
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
