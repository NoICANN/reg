name: Register New Domains

on:
  push:
    branches:
      - main

jobs:
  register_domains:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v2

    - name: Set up Git configuration
      run: |
        git config --global user.email "xamyl@users.noreply.github.com"
        git config --global user.name "xamyl"

    - name: Generate and commit domain files
      run: |
        BRANCH=domain-reg-${{ github.run_id }}
        git checkout -b $BRANCH
        # Your logic to generate new domain files here
        echo "Creating test domain files..." > data/test1.two.json
        echo "Creating test domain files..." > data/test.two.json
        git add data/*.json
        git commit -m "🔖 Register new domains (auto-generated)"

    - name: Push changes to the new branch
      run: |
        git push origin $BRANCH

    - name: Create (or update) Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "🔖 Register new domains (auto-generated)"
        branch: domain-reg-${{ github.run_id }}
        base: main
        title: "Register new domain(s)"
        body: |
          This PR was automatically generated by GitHub Actions to register
          new domain requests from Supabase.
        add-paths: |
          data/*.json
        draft: false
        repository: NoICANN/reg
