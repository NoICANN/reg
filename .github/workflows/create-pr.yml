name: Generate & Publish Domain PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  generate-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - run: npm install

      - run: node .github/scripts/generate-pr.js

      - run: |
          git config user.name "noicann-bot"
          git config user.email "bot@noicann.org"

      - run: git add data/

      - id: git-check
        run: |
          git diff --name-only HEAD
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.git-check.outputs.changed == 'true'
        run: |
          BRANCH=domain-reg-${{ github.run_id }}
          git checkout -b $BRANCH
          git commit -m "🔖 Register new domains (auto-generated)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh pr create \
            --repo ${{ github.repository }} \
            --head domain-reg-${{ github.run_id }} \
            --base main \
            --title "Register new domain(s)" \
            --body "This PR was automatically generated by GitHub Actions to register new domain requests from Supabase."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
