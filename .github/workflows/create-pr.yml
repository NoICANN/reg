name: Generate & Publish Domain PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # runs at the top of every hour

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  generate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # fetch full history so we can create branches

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate domain files
        run: node .github/scripts/generate-pr.js

      - name: Configure Git identity
        run: |
          git config user.name "noicann-bot"
          git config user.email "bot@noicann.org"

      - name: Check for changes
        id: git-check
        run: |
          # If no diff, exit with changed=false
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push new domain files
        if: steps.git-check.outputs.changed == 'true'
        run: |
          BRANCH=domain-reg-${{ github.run_id }}
          git checkout -b $BRANCH
          # Stage only the data/ directory
          git add data/
          git commit -m "🔖 Register new domains (auto-generated)"
          git push origin $BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        run: |
          # Create PR using the GITHUB_TOKEN
          gh auth login --with-token <<< $GITHUB_TOKEN
          gh pr create \
            --repo ${{ github.repository }} \
            --head $BRANCH \
            --base main \
            --title "Register new domain(s)" \
            --body "This PR was automatically generated by GitHub Actions to register new domain requests from Supabase."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
