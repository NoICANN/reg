name: Generate & Publish Domain PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  generate-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - run: npm install

      - run: node .github/scripts/generate-pr.js

      - name: Commit domain files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b domain-reg-${{ github.run_id }}
          git add data/*.json
          git commit -m "🔖 Register new domains (auto-generated)"
          git push --set-upstream origin domain-reg-${{ github.run_id }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: domain-reg-${{ github.run_id }}
          base: main
          title: "Register new domain(s)"
          body: |
            This PR was automatically generated by GitHub Actions to register
            new domain requests from Supabase.
          add-paths: |
            data/*.json
