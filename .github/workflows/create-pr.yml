name: Generate & Publish Domain PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  generate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate domain files
        run: node .github/scripts/generate-pr.js

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit new domains
        run: |
          BRANCH=domain-reg-${{ github.run_id }}
          git checkout -b $BRANCH
          git add data/*.json
          git commit -m "🔖 Register new domains (auto-generated)"
          git push --set-upstream origin $BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch main for diff check
        run: git fetch origin main:main

      - name: Check for real changes in data/*.json
        id: diff-check
        run: |
          # Check only the target files for changes
          if git diff --quiet origin/main -- data/*.json; then
            echo "no-changes=true" >> $GITHUB_OUTPUT
          else
            echo "no-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or update Pull Request
        if: steps.diff-check.outputs.no-changes == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔖 Register new domains (auto-generated)"
          branch: domain-reg-${{ github.run_id }}
          base: main
          title: "Register new domain(s)"
          body: |
            This PR was automatically generated by GitHub Actions to register
            new domain requests from Supabase.
          add-paths: |
            data/*.json
          draft: false
          delete-branch: true
          labels: domain