name: Generate & Publish Domain PRs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write
  pull-requests: write

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  generate-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - run: npm install

      - run: node .github/scripts/generate-pr.js

      - run: |
          git config user.name "noicann-bot"
          git config user.email "bot@noicann.org"

      - run: git add data/

      - id: git-check
        run: |
          git diff --name-only HEAD
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.git-check.outputs.changed == 'true'
        run: |
          BRANCH=domain-reg-${{ github.run_id }}
          git checkout -b $BRANCH
          git commit -m "🔖 Register new domains (auto-generated)"
          git push origin $BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔖 Register new domains (auto-generated)"
          branch: domain-reg-${{ github.run_id }}
          title: "Register new domain(s)"
          body: |
            This PR is auto-generated by the workflow to register new domains.
            Please review and merge it if everything looks good.
          labels: domain
          base: main
